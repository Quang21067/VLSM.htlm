<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEVERSE VN - Cổng Tin Tức 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --bg: #0b111a; --card-bg: #1a222d;
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .hidden { display: none !important; }

        /* --- Header --- */
        header { background: rgba(42, 62, 93, 0.95); padding: 20px 0; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; letter-spacing: 2px; cursor: pointer; }
        .nav-links span { margin-left: 25px; cursor: pointer; color: var(--text); transition: 0.3s; font-family: 'Orbitron'; font-size: 0.75rem; }
        .nav-links span:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary); }

        /* --- Hero & Controls --- */
        .hero { text-align: center; padding: 60px 0 30px; }
        .hero h1 { font-family: 'Orbitron'; font-size: 2.2rem; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase; }
        .controls-wrapper { margin-top:20px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom: 40px; }
        .controls-wrapper input, .controls-wrapper select { padding:12px 20px; border-radius:6px; border:1px solid var(--border); background:#0f172a; color:white; outline: none; }
        .controls-wrapper input:focus { border-color: var(--primary); }

        /* --- Game Grid --- */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .game-card { 
            background: var(--card-bg); border-radius: 12px; padding: 25px; 
            transition: 0.4s; cursor: pointer; border: 1px solid transparent;
            display: flex; flex-direction: column; height: 100%;
        }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 40px rgba(0, 210, 255, 0.15); }
        .game-img-wrapper { width: 100%; height: 180px; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: #0f172a; }
        .game-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .game-card:hover .game-img-wrapper img { transform: scale(1.1); }
        .card-title { font-family: 'Orbitron'; color: var(--primary); font-size: 1.3rem; margin-bottom: 10px; }
        .engine-badge { display: inline-block; border: 1px solid var(--primary); color: var(--primary); padding: 3px 10px; border-radius: 4px; font-size: 0.7rem; margin-bottom: 15px; font-weight: bold; }

        /* --- Dynamic Blurred Background --- */
        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2 !important; /* Nằm dưới cùng */
            background-size: cover; background-position: center;
            transition: background-image 0.8s ease-in-out; /* Hiệu ứng chuyển mượt */
            pointer-events: none;
        }

        /* --- News List --- */
        .news-item { background: var(--card-bg); border-radius: 10px; padding: 20px; margin-bottom: 15px; display: flex; gap: 20px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .news-item:hover { border-color: var(--primary); background: #222c3a; }
        .news-item img { width: 160px; height: 100px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #0f172a; }

        /* Lớp phủ làm tối và làm mờ */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 17, 26, 0.6); /* Màu tối che lên ảnh */
            backdrop-filter: blur(4px); /* Hiệu ứng làm mờ ảnh nền */
            -webkit-backdrop-filter: blur(4px);
            z-index: -1;
        }

        /* Thêm hiệu ứng đổ bóng cho các khung nội dung để chữ không bị lóa trên nền rõ */
        .game-card, .news-item, .article-content, .modal-content {
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: rgba(26, 34, 45, 0.95); /* Làm khung đậm hơn một chút */
        }

        /* Đảm bảo nội dung hiển thị rõ trên nền mờ */
        header, main, footer {
            position: relative;
            z-index: 10; /* Đảm bảo số này lớn hơn -1 của lớp nền */
        }

        header {
            background: rgba(26, 34, 45, 0.8) !important;
        }

        /* --- Article Detail --- */
        .article-content { max-width: 850px; margin: 0 auto; padding: 40px 0; }
        .main-art-img { width:100%; height:450px; object-fit: cover; border-radius:15px; margin-bottom:30px; border:1px solid var(--border); }
        .article-body { font-size: 1.1rem; line-height: 1.8; color: #cbd5e0; white-space: pre-line; border-top: 1px solid var(--border); padding-top: 30px; }
        .btn-back { color: var(--primary); cursor: pointer; margin-bottom: 25px; display: inline-block; font-family: 'Orbitron'; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { letter-spacing: 1px; }

        /* --- Comments --- */
        textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); border-radius: 8px; padding: 15px; color: white; margin-bottom: 15px; resize: vertical; min-height: 100px; }
        .cmt-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--primary); }

        footer { padding: 50px 0; text-align: center; border-top: 1px solid var(--border); margin-top: 100px; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 1px; }

        /* --- Login & Register Modal --- */
       .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 2000;}
       .modal-content { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); width: 100%; max-width: 420px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);}
       .tab-header { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
       .tab-item {  padding: 10px 0; cursor: pointer; color: var(--text-dim);  font-family: 'Orbitron'; font-size: 0.9rem; transition: 0.3s;}
       .tab-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

       .form-group { margin-bottom: 15px; text-align: left; }
       .form-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-dim); }
       .form-group input {  width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border);  color: white; border-radius: 6px; outline: none; }
       .form-group input:focus { border-color: var(--primary); }

       .btn-main {  width: 100%; padding: 12px; background: var(--primary); border: none;  border-radius: 6px; font-weight: bold; cursor: pointer;  font-family: 'Orbitron'; margin-top: 10px; }
       .divider { margin: 20px 0; display: flex; align-items: center; color: var(--text-dim); font-size: 0.7rem; }
       .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }
    </style>
</head>

                news: [
                    { id: 1, t: "Garena Liên Quân Mobile chính thức tham gia 2026 Esports World Cup trong sự kiện hợp tác đặc biệt cùng Honor of Kings", d: "27/03/2026", thumb: "https://lienquan.garena.vn/wp-content/uploads/2026/03/SeaTalk_IMG_20260327_090316-1-1536x864.jpeg", body: "<b>Việt Nam</b>, 27 tháng Ba 2026 — Garena chính thức đưa ra công bố về việc Liên Quân Mobile sẽ có màn ra mắt tại giải đấu 2026 Esports World Cup (EWC26) thông qua một sự kiện hợp tác đặc biệt với Vương Giả Vinh Diệu, đánh dấu một cột mốc đáng nhớ cho dịp kỷ niệm 10 năm thành lập tựa game. Được tổ chức tại Riyadh, Saudi Arabia, các đội tuyển hàng đầu tại những giải đấu lớn của Liên Quân Mobile sẽ tham gia thi đấu tại EWC26 cùng với những đội tuyển khác.\n\nGarena cũng đã chia sẻ những thông tin đầu tiên về kế hoạch cho thể thao điện tử của Liên Quân Mobile trong năm 2026, bao gồm sự trở lại của giải đấu AoV Premier League (APL) cùng với một thể thức đa hạng mục mới. Trong tương lai, những thông tin tiếp theo về giải đấu AoV International Championship (AIC), giải đấu được tổ chức vào cuối năm tại Thái Lan, sẽ được công bố trong nửa cuối năm 2026.\n\nNhững cải tiến này thể hiện sự đầu tư liên tục của Garena vào việc củng cố hệ sinh thái esports của Liên Quân Mobile tại các thị trường trọng điểm, đồng thời tạo thêm nhiều cơ hội để người chơi và người hâm mộ tương tác với trò chơi.\n\n<b>Liên Quân Mobile góp mặt tại Esports World Cup 2026</b>\n\nDiễn ra từ ngày 30/7 đến 8/8, EWC 2026 sẽ có 20 đội tuyển tranh tài với tổng giải thưởng lên đến 3 triệu USD. Ba đội đứng đầu từ các giải đấu lớn của Garena – Arena of Glory (AOG), RoV Pro League (RPL) và Garena Challenger Series (GCS) – sẽ được mời tham dự.\n\nGiải đấu sẽ diễn ra qua ba giai đoạn thi đấu, quy tụ các đội tuyển hàng đầu trong những trận chiến kịch tính, căng thẳng, khiến người hâm mộ không thể rời mắt.\n\nVòng Play-in\n<ul><li>8 đội (2 bảng, mỗi bảng 4 đội)</li><li>Thể thức Bo3 / Nhánh thắng – nhánh thua (Double Elimination) / Ban & Pick Quốc tế</li><li>TOP 2 mỗi bảng tiến vào Vòng bảng</li></ul>\n\nVòng bảng (Group Stage)\n<ul><li>16 đội (4 bảng, mỗi bảng 4 đội)</li><li>Thể thức Bo3 / Nhánh thắng – nhánh thua / Global Ban & Pick</li><li>TOP 2 mỗi bảng tiến vào Playoffs</li></ul>\n\nPlayoffs\n<ul><li>8 đội (2 bảng, mỗi bảng 4 đội)</li><li>Thể thức Bo7 (Tranh hạng 3 Bo5) / Loại trực tiếp (Single Elimination)/ Ban & Pick Quốc tế và Ultimate Battle</li></ul>", cmts: []},

à bắt đầu ở Vòng Bracket là các đội Hạt Giống Số 1 của mỗi khu vực, cũng như đội hạt giống số 2 từ khu vực có 2 hạt giống và có thứ hạng cao nhất tại First Stand. 11 đội sẽ giành quyền tham dự là:\n<ul><li>2 đội từ mỗi khu vực LCK, LCS, LCP, LEC và LPL (tổng cộng 10 đội)</li><li>1 đội từ CBLOL</li></ul>\n\n<b>Thông Tin Bán Vé</b>\nVé tham dự MSI 2026 sẽ được mở bán theo từng đợt thông qua NOL World, mang đến cho người hâm mộ nhiều cơ hội để sở hữu chỗ ngồi cho bản thân.\n<b>Mở Bán Vé Quốc Tế (Yêu cầu hộ chiếu)</b>\n<ul><li>Chủ thẻ Mastercard sẽ nhận được ưu đãi mua vé trước! Họ có thể truy cập trang web bán vé và mua vé bằng thẻ Mastercard vào ngày 21/04.</li><li>Mở Bán Chung: 23/04</li></ul><b>Mở Bán Vé Tại Hàn Quốc (Yêu cầu căn cước công dân Hàn Quốc)</b>\n<ul><li>Mở Bán Chung: 21/05</li></ul>\n\n<b>CKTG 2026 Trở Lại Với Bắc Mỹ</b>\nVào cuối năm nay, CKTG sẽ quay trở lại Bắc Mỹ, mang đỉnh cao của thi đấu cạnh tranh đến nhiều thành phố trên khắp nước Mỹ. Với sự kết hợp giữa các địa điểm thi đấu quen thuộc và địa điểm tổ chức Chung Kết biểu tượng, sự kiện năm nay được tạo ra để mang đến những khoảnh khắc khó quên cho người hâm mộ ở mọi giai đoạn của giải đấu.\n\n<b>Cập Nhật Thể Thức:</b>\nThể thức của CKTG 2026 phần lớn sẽ tương tự như CKTG 2025 và chỉ có những thay đổi ở thể thức Vòng Play-Ins cũng như việc phân bổ hạt giống khu vực.\nTrong khuôn khổ các cập nhật này, chúng tôi đã xem xét lại việc phân bổ suất tham dự CKTG 2026 theo khu vực và sẽ trao thêm một suất cho CBLOL tại sự kiện này. Với sự bổ sung này, 19 đội tuyển từ khắp nơi trên thế giới sẽ tranh tài tại CKTG được tổ chức ở Mỹ.\nTổng cộng 19 đội tuyển sẽ giành quyền tham dự là:\n<ul><li>3 đội từ mỗi khu vực LCK, LCS, LCP, LEC và LPL (tổng cộng 15 đội)</li><li>2 đội từ CBLOL</li><li>1 đội: Nhà Vô Địch MSI*</li><li>1 đội bổ sung từ khu vực xếp thứ 2 tại MSI</li></ul>Vòng Play-Ins sẽ bao gồm 4 đội tuyển thi đấu theo thể thức bảng đấu nhánh thắng - nhánh thua BO5, trong đó 1 đội tuyển sẽ tiến vào Vòng Swiss. Thứ tự hạt giống cho tất cả các đội giành quyền tham dự sẽ được xác định dựa trên thành tích khu vực, bao gồm cả kết quả từ MSI 2026, và sẽ được công bố sau.\n\n<i>*Đội tuyển này phải lọt vào Vòng Playoffs tại giải đấu quốc nội để giữ được vé mời</i>\n\n<b>Thay Đổi Cho Vòng Play-Ins: Los Angeles</b>\nDo một số khó khăn về mặt hậu cần, chúng tôi sẽ điều chỉnh kế hoạch và tổ chức Vòng Play-Ins tại Nhà Thi Đấu Riot Games ở Los Angeles trước khi chuyển đến Allen, Texas, cho các vòng đấu đã được công bố trước đó.\n\n<b>Vòng Swiss, Tứ Kết Và Bán Kết: Allen, Texas</b>\nPhần lớn các trận đấu của CKTG sẽ diễn ra tại Trung Tâm Sự Kiện Credit Union of Texas (CUTX) tọa lạc tại Allen, Texas, gần phía bắc Dallas. Được xây dựng để đón tiếp hàng ngàn người hâm mộ, đấu trường này chính là sân khấu nơi những câu chuyện của giải đấu diễn ra. Vị trí trung tâm của địa điểm này cũng sẽ giúp người hâm mộ trên khắp Bắc Mỹ dễ dàng đến tham dự giải đấu.\n\n<b>Vòng Chung Kết CKTG: Brooklyn, New York</b>\nĐối với khoảnh khắc quan trọng nhất của mùa giải, CKTG sẽ đến với Brooklyn! Trận Chung Kết Tổng sẽ diễn ra tại Barclays Center, một trong những đấu trường nổi tiếng nhất thế giới, ở Brooklyn, New York. Đây là địa điểm hoàn hảo để tìm ra Nhà Vô Địch Thế Giới mới, tôn vinh di sản của Liên Minh Huyền Thoại và quy tụ người hâm mộ trên toàn cầu cho một đêm khó quên.\n\nCKTG 2026 sẽ diễn ra từ ngày 15/10 - 14/11, trong đó mỗi vòng đấu sẽ được tổ chức ở một thành phố khác nhau:\n<b>Vòng Play-Ins: 15 - 18/10</b> (Nhà Thi Đấu Riot Games, Los Angeles)\n<b>Vòng Swiss: 23 - 26/10 và 28 - 31/10 </b>(Trung Tâm Sự Kiện Credit Union of Texas, Allen, Texas)\n<b>Vòng Knockout: 03 - 08/11</b> (Trung Tâm Sự Kiện Credit Union of Texas, Allen, Texas)\n<ul><li>Tứ Kết: 03 - 06/11</li><li>Tứ Kết: 03 - 06/11</li></ul>\n<b>Chung Kết Tổng: 14/11</b> (Barclays Center, Brooklyn, New York)\n\n\n<b>Thông Tin Bán Vé</b>\nVé tham dự CKTG 2026 sẽ được mở bán vào giai đoạn từ giữa đến cuối Tháng 7. Hãy theo dõi để biết thêm thông tin cập nhật.", cmts: [] }                ]

                news: [
                    { id: 6, t: "Thay Đổi Sắp Tới Ở VCT Pacific", d: "23/03/2026", thumb: "https://cmsassets.rgpub.io/sanity/images/dsfx7636/news_live/63ae3c7a598ef3fc542ac33b9ceb18f84d3930cd-1920x1080.jpg?accountingTag=val_esports&auto=format&fit=max&w=3840", body: "<h2>Hãy đọc thêm tại đây.</h2>\n\nCảm ơn tất cả các bạn vì đã kiên nhẫn trong lúc chúng tôi xem xét một số mối quan ngại do cộng đồng nêu lên sau giải đấu Kickoff.\n\nTính cạnh tranh công bằng vẫn là một trong những trụ cột quan trọng nhất tại giải đấu của chúng tôi. Và mặc dù chúng tôi luôn nỗ lực hướng đến điều tốt nhất, sẽ luôn có những thứ mà chúng tôi vẫn cần cải thiện. Vì vậy, chúng tôi rất biết ơn các thành viên trong cộng đồng đã nêu lên những mối quan ngại của họ với chúng tôi, cũng như cảm kích những người hâm mộ luôn quan tâm sâu sắc.\n\nChúng tôi đã xem xét kỹ lưỡng một số quy trình cũng như quy định của mình và sẽ thực hiện những thay đổi với hy vọng cải thiện trải nghiệm thi đấu cho các đội tuyển trong tương lai.\n\n<hr>\n\n<b><u>Sử Dụng Tai Nghe</u></b>\nNhằm tăng cường tính công bằng cho toàn giải đấu, chúng tôi đã kiểm tra việc sử dụng tai nghe trong giải đấu Kickoff. \n\nChúng tôi đã xem xét các đoạn video thi đấu cũng như ghi hình khuôn mặt của tất cả các đội trong suốt giải đấu và xác nhận 2 trường hợp sử dụng thiết bị không đúng quy định trong các trận đấu sau: \n<ul><li>Ngày 23/01, GEN vs. DFM (Ván 2) – GEN Lakia </li><li>Ngày 05/02, TS vs. ZETA (Ván 2, 3) – TS Sylvan</li></ul>\nSau khi xem xét các đoạn video và nội dung giao tiếp từ những trận đấu cụ thể này, chúng tôi không tìm thấy bằng chứng cho thấy việc sử dụng tai nghe không đúng quy định là cố ý, cũng như không tìm thấy bằng chứng cho thấy các cá nhân này đã thu thập thông tin bình luận tại địa điểm thi đấu để tạo lợi thế đáng kể trong trận đấu. Trên thực tế, cả hai đội này đều đã để thua trong các ván đấu mà tai nghe được sử dụng không đúng cách. \n\nTheo Mục 2.3.7 (Hạn Chế Về Âm Thanh) của Điều Lệ và Danh Mục Hình Phạt trong mục <b><i>Tháo Gỡ Hoặc Sử Dụng Thiết Bị Trái Phép</i></b> (Lần Vi Phạm Đầu Tiên), một Thông Báo Bằng Văn Bản đã được gửi đến các tuyển thủ liên quan. Ngoài ra, họ cũng đã được thông báo rằng các vi phạm tái diễn có thể dẫn đến những biện pháp kỷ luật bổ sung.\n\nĐể giải quyết vấn đề này một cách chủ động hơn trong thời gian tới, chúng tôi đã tăng cường các quy định giám sát việc sử dụng tai nghe trong các trận đấu thông qua việc tăng cường giám sát góc nhìn của tuyển thủ và cập nhật quy trình kiểm tra của trọng tài.\n\nChúng tôi cũng đã ban hành thông báo phòng ngừa cho tất cả các đội, nhắc nhở rằng các tuyển thủ phải đảm bảo tai nghe che kín tai mọi lúc và phải được sự cho phép của trọng tài trước khi tháo tai nghe, nếu không họ sẽ bị phạt.\n\n<b><u>Âm Lượng Âm Thanh Tại Địa Điểm Thi Đấu</u></b>\nChúng tôi luôn muốn tìm kiếm sự cân bằng giữa việc mang đến một trải nghiệm sôi động tại địa điểm thi đấu cho người hâm mộ và xây dựng một không gian cạnh tranh công bằng trên sân khấu. Vì vậy, kiểm tra âm thanh là một phần quan trọng trong công tác kiểm tra sân khấu trước sự kiện. \n\nCác bước kiểm tra này bao gồm kiểm tra âm thanh khi bình luận viên nói ở mức âm lượng tối đa nhằm đảm bảo các tuyển thủ không thể nghe rõ lời của bình luận viên tại địa điểm thi đấu.\n\nChúng tôi cũng áp dụng hệ thống cách âm kép cho các trận đấu trực tiếp, trong đó các tuyển thủ đeo tai nghe kiểm âm bên cạnh tai nghe chụp tai khi thi đấu ở trên sân khấu. Âm thanh giao tiếp của đội được phát qua tai nghe kiểm âm, trong khi tiếng ồn trắng được phát qua tai nghe chụp tai để chặn âm thanh bên ngoài.\n\nMặc dù một số tiếng ồn bên ngoài nhất định là điều khó tránh khỏi, đặc biệt là khi các bình luận viên và khán giả nói to hoặc cổ vũ lớn tiếng, nhưng hệ thống âm thanh của chúng tôi có thể chặn hoàn toàn việc nghe rõ từng câu chữ và cho đến nay vẫn chưa có bất kỳ báo cáo chính thức nào từ các tuyển thủ trong những trận đấu trực tiếp của sự kiện Kickoff.\n\nĐể tăng cường hơn nữa hệ thống âm thanh của mình trong tương lai, chúng tôi sẽ thực hiện một số cập nhật cho khâu kiểm tra kỹ thuật từ Stage 1 trở đi.\n\nHiện tại, chúng tôi đang xem xét một số quy trình được cải thiện, bao gồm phân bổ thêm thời gian và kiểm tra âm thanh kỹ càng hơn dựa trên các buổi tập dượt. Hệ thống thiết bị âm thanh cũng sẽ được kiểm tra hiệu suất hoạt động với mức âm lượng bình luận viên tối đa được nâng lên đáng kể so với ngưỡng tiêu chuẩn. \n\nChúng tôi cũng sẽ tiếp tục đảm bảo rằng các đội ngũ vận hành của mình có thể nhanh chóng điều chỉnh mức âm thanh tại địa điểm thi đấu nếu các đội tuyển báo cáo sự cố trên sân khấu.\n\n<hr>\n\nMột lần nữa, xin cảm ơn sự ủng hộ của các bạn. Chúng tôi rất mong muốn được phát triển môn thể thao này cùng với cộng đồng đầy nhiệt huyết của mình tại khu vực Châu Á - Thái Bình Dương. ", cmts: [] }

                desc: "Vật lý khói và lửa được nâng cấp toàn diện, tạo nên những tình huống giao tranh kịch tính.",
                news: [
                    { id: 7, t: "Cập nhật Counter-Strike 2", d: "19/03/2026", thumb: "https://clan.akamai.steamstatic.com/images/3381077/5dd914dd4a8901aa52b0075f683a6d0e3538d55b.png", body: "[ LỐI CHƠI ]\n<ul><li>Quá trình nạp đạn được cơ cấu lại để khuyến khích cân nhắc kỹ lưỡng về cách sử dụng đạn. Khi bạn nạp đạn từ vũ khí có băng đạn, tất cả lượng đạn còn lại trong băng đạn sẽ vứt đi và một băng đạn đầy mới sẽ được lấy từ túi dự trữ.</li><li>Lượng đạn dự trữ giờ sẽ hiển thị theo số lượng băng đạn, vỏ đạn rời (với shotgun), hoặc viên đạn, tùy thuộc vào vũ khí.</li><li>Mức độ lấp đầy của vũ khí hiện tại giờ sẽ hiển thị ở dưới số đạn trong súng.</li><li>Điều chỉnh số lượng băng đạn dự trữ cho mỗi vũ khí.</li>\n\n[ HƯỚNG DẪN BẢN ĐỒ ]\n<ul><li>Hướng dẫn bản đồ giới hạn giờ có thể chọn trong tranh hạng và Retake (5 ván đầu tiên mỗi hiệp, tối đa 30 điểm chú thích).</li><li>sv_allow_annotations_access_level hỗ trợ ba giá trị: 0 – tắt. 1 – xem có giới hạn. 2 – đầy đủ và có thể chỉnh sửa.</li><li>sv_annotation_limits_max_rounds_per_half (mặc định 5) xác định số ván đấu trong nửa hiệp mà hướng dẫn được phép hiển thị. -1 sẽ bỏ giới hạn.</li><li>Hướng dẫn bản đồ khởi đầu tối giản được thêm cho toàn bộ nhóm bản đồ thường trực.</li></ul>\n\n[ BẢN ĐỒ WORKSHOP ]\n<ul><li>Khi chơi chế độ luyện tập hoặc bản đồ Workshop, bạn bè có thể tham gia qua menu bạn bè nếu họ đặt thiết lập <i>Nhóm mở</i>.</li></ul>", cmts: [] }

                    { id: 8, t: "[MÙA THẺ MỚI] 26 HEROES: TẬP HỢP SIÊU ANH HÙNG – CHINH PHỤC MỌI ĐỈNH CAO", d: "31/03/2026", thumb: "https://fconline.garena.vn/wp-content/uploads/2026/03/IMG-SQR-1200x1200-076975-1200x1200.sfnfzmcs1v.png", body: "Xin chào các HLV,\n\nTrong thế giới bóng đá, hào quang không phải lúc nào cũng chiếu rọi lên tất cả. Đằng sau những ngôi sao rực rỡ luôn có những con người thầm lặng cống hiến, sẵn sàng chiến đấu hết mình vì màu cờ sắc áo. Họ không chỉ là những người hùng bước ra từ nghịch cảnh, mà còn vững vàng giữa tâm bão và chiến đấu không ngừng để tạo nên nền tảng cho những kỷ nguyên huy hoàng của câu lạc bộ. Trên tất cả, họ chính là ngọn lửa tinh thần tiếp thêm sức mạnh để chinh phục mọi đỉnh cao.\n\nCùng chào đón sự xuất hiện của mùa thẻ 26 HEROES – Nơi vinh danh những cầu thủ đã hóa thân thành người hùng giúp đội bóng đạt chiến thắng danh giá. Lần này, FC Online Việt Nam chính thức trình làng 9 cái tên vĩ đại, 9 biểu tượng bất diệt trong lòng người hâm mộ.\n\n<ul><li>Chính thức xuất hiện: 01.04.2026</li></ul>\nCùng khám phá ngay, dàn siêu anh hùng 26 Heroes lần này có gì đặc biệt nhé!\n\n<h2><b>DANIELE DE ROSSI – ĐẤU SĨ THÀNH ROME</h2></b>\nTrải qua bao thăng trầm, tình yêu và sự trung kiên của De Rossi dành cho AS Roma vẫn luôn vững chãi như chính những bức tường thành vĩnh cửu. Từ chối mọi danh vọng và vinh quang rực rỡ ở những chân trời mới, “Capitan Futuro” đã dành trọn thanh xuân để án ngữ tuyến giữa của đội bóng thủ đô.\n\nMang trong mình dòng máu của một võ sĩ giác đấu, De Rossi là hiện thân của lối chơi máu lửa, lăn xả và dập tắt mọi đợt lên bóng của đối phương. Một lá chắn thép thực thụ với nhãn quan chiến thuật sắc bén và những cú sút xa búa bổ. Với tinh thần rực lửa ấy đã biến anh thành linh hồn không thể thay thế của đội bóng áo bã trầu.\n\nNgay ở mức thẻ +1, De Rossi 26HR đã là “cỗ máy quét” tuyến giữa với dàn chỉ số phòng ngự hoàn hảo như Quyết đoán 125, Cắt bóng và Lấy bóng 124. Cùng Thể lực 123 bao sân không biết mệt và Chuyền dài 126, anh chính là trạm trung chuyển bóng hoàn hảo cho mọi sơ đồ. Đặc biệt, đây chắc chắn sẽ là mẫu “tiền vệ quốc dân” không thể thiếu cho các HLV  nào có đam mê build team color tuyển Ý và đội bóng thủ đô AS Roma.\n\n<h2><b>ROY MAKAAY – BÓNG MA LỪNG DANH</h2></b>\nKhông cần đảo chân vẽ vời hay chạm bóng quá nhiều, Roy Makaay vẫn có thể gieo rắc nỗi kinh hoàng cho mọi đối thủ bằng một siêu năng lực bí ẩn “Thoắt ẩn thoắt hiện”. Khả năng di chuyển không bóng như một bóng ma (hay còn gọi là “Das Phantom”) luôn khiến mọi hệ thống phòng ngự phải rơi vào trạng thái bế tắc.\n\nChỉ cần một khoảnh khắc đối phương mất dấu, Makaay sẽ lập tức tung ra đòn trừng phạt chớp nhoáng. Cú sút xé lưới Real Madrid chỉ sau đúng 10 giây ngắn ngủi chính là minh chứng rõ ràng nhất cho sự nhạy bén và khả năng chớp thời cơ đáng sợ ấy. Sở hữu kỹ năng dứt điểm một chạm thần sầu cùng bản năng đánh hơi khoảng trống đỉnh cao, “Bóng ma” xứ Tulip luôn biết cách kết liễu trận đấu từ những cơ hội nhỏ nhất.\n\nMột sát thủ vòng cấm đích thực! Chỉ ở mức thẻ +1, “Das Phantom” đã sở hữu Dứt điểm 127, Lực sút 127 và Vô-lê 128. Kết hợp cùng khả năng Chọn vị trí 126 và chỉ số ẩn sắc bén, mọi pha ra chân của Makaay đều là những nhát kiếm chí mạng kết liễu trận đấu. Hứa hẹn sẽ trở thành làn gió mới cực kỳ đáng trải nghiệm dành cho các HLV đang có ý định xây dựng đội hình team color Hà Lan và Bayern Munich.\n\n<h2><b>ULRICH HOENEß – KIẾN TRÚC SƯ HÙM XÁM</h2></b>\nKhông chỉ được biết đến như người đàn ông quyền lực đã nhào nặn nên một Bayern Munich thống trị châu Âu, Uli Hoeneß thời còn sải bước trên thảm cỏ được ví như một “cơn lốc đường biên” thực thụ. Siêu năng lực của ông nằm ở những bước chạy xé gió cùng khả năng bứt tốc kinh hoàng, biến mọi nỗ lực cản phá của hàng thủ đối phương thành vô vọng.\n\nSở hữu lối đá trực diện đầy quyết đoán, Hoeneß đã luôn gieo rắc nỗi khiếp sợ bằng những pha dốc bóng đâm xuyên mọi hệ thống phòng ngự. Khả năng càn lướt vô song ấy đã biến ông thành một mũi khoan tàn phá mọi hành lang cánh, góp công lớn tạo nên trục xương sống vĩ đại mang về 3 chức vô địch Cúp C1 liên tiếp cho Hùm Xám xứ Bavaria.\n\nVũ khí đáng sợ nhất của “Kiến trúc sư Hùm Xám” chính là những pha bứt tốc xé gió với Tốc độ 128 và Tăng tốc 126 ngay tại thẻ +1. Sự xuất hiện của mùa thẻ này hứa hẹn mang đến một “làn gió mới lạ”, nâng tầm đột biến cho anh em đang build team color Đức và Bayern. Với Rê bóng 122 và Tạt bóng 120, ông là một mũi khoan sắc lẹm sẵn sàng xé toạc mọi hành lang cánh và dọn cỗ hoàn hảo cho các tiền đạo mục tiêu.\n\n<h2><b>MICAH RICHARDS – CỖ XE TĂNG NGOẠI HẠNG</h2></b>\nMỗi khi nhắc đến Micah Richards là nhắc đến một con quái vật thể chất đích thực. Không có tiền đạo nào muốn đối đầu với nụ cười tươi rói nhưng đi kèm với sức mạnh tỳ đè tàn bạo của chàng hậu vệ người Anh. Richards cũng chính là một nhân tố lịch sử trong chiến dịch vô địch Ngoại hạng Anh đầy cảm xúc của Nửa xanh thành Manchester mùa giải 2011/2012. \n\nTrấn giữ hành lang cánh phải, Richards mang đến sự an tâm tuyệt đối nhờ thể hình hộ pháp và lối chơi phòng ngự không ngại va chạm. Anh giống như một cỗ xe tăng ủi văng mọi chướng ngại vật trong các pha tranh chấp tay đôi, biến cánh phải thành khu vực cấm địa.\n\n“Cỗ xe tăng” M. Richards 26HR án ngữ hành lang phải sở hữu Sức mạnh chạm ngưỡng 126 ngay ở thẻ +1, đủ sức húc văng mọi tiền đạo quốc dân. Tốc độ 121 cùng Lấy bóng 122 biến anh thành một bức tường thành kiên cố “nội bất xuất, ngoại bất nhập”. Đây chắc chắn là chốt chặn đáng tin cậy và là sự bổ sung hoàn hảo bên hành lang cánh phải cho anh em đam mê build Team Color Man City cũng như tuyển Anh.\n\n<h2><b>ĐIỂM QUA NHỮNG NGƯỜI HÙNG KHÁC GÓP MẶT TRONG MÙA THẺ 26HR </h2></b>\n<ul><li>Pablo Aimar</li><li>Ricardo Quaresma</li><li>Míchel Salgado Fernandez</li><li>Claudio Pizarro</li><li>Iván Zamorano</li></ul>\nVà đó là 9 cái tên vĩ đại sẽ chính thức góp mặt trong mùa thẻ 26 HEROES. Hãy sẵn sàng trải nghiệm siêu năng lực của họ trên sân cỏ FC Online từ ngày 01.04!\n\nCác HLV đừng quên theo dõi Fanpage EA Sports FC Online Vietnam để cập nhật những tin tức nóng hổi nhé! \n\nTrân trọng,", cmts: [] }

        function changeBg(imgUrl) {
            document.getElementById('dynamic-bg').style.backgroundImage = `url('${imgUrl}')`;
        }

        function showView(viewName) {
            const views = ['view-home', 'view-list', 'view-detail'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById('view-' + viewName).classList.remove('hidden');
            
            if (viewName === 'home') {
            // Quay về trang chủ -> Hiện ảnh nền mặc định 
            changeBg(defaultBg); 
        }
        window.scrollTo(0,0);
        }

        function scrollToNews() {
            showView('home');
            window.scrollTo({ top: document.getElementById('mainGrid').offsetTop - 100, behavior: 'smooth' });
        }

        function filterGames() {
            const text = document.getElementById('searchInput').value.toLowerCase();
            const eng = document.getElementById('engineFilter').value;
            const filtered = database.filter(g => {
                const matchText = g.name.toLowerCase().includes(text);
                const matchEng = (eng === 'all' || g.engine === eng);
                return matchText && matchEng;
            });
            renderGrid(filtered);
        }

        function renderGrid(list) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = list.map(g => `
                <div class="game-card" onclick="showNewsList('${g.id}')">
                    <div class="game-img-wrapper">
                        <img src="${g.img}" alt="${g.name}">
                    </div>
                    <div class="card-title">${g.name}</div>
                    <div><span class="engine-badge">${g.engine}</span></div>
                    <p style="color:var(--text-dim); font-size:0.9rem;">${g.desc}</p>
                </div>
            `).join('');
        }

        function showNewsList(gid) {
            activeG = database.find(x => x.id === gid);
    
        // Đổi nền theo game được chọn
        changeBg(activeG.bg);
        
        showView('list');
        document.getElementById('listTitle').innerText = activeG.name;
        const container = document.getElementById('listContainer');
        container.innerHTML = activeG.news.map(n => `
           <div class="news-item" onclick="showArticle(${n.id})">
               <h3 style="color:var(--primary)">${n.t}</h3>
               <p style="font-size:0.8rem; color:var(--text-dim); margin-top:5px">Cập nhật: ${n.d}</p>
            </div>
        `).join('');
        }

        function showArticle(aid) {
            const art = activeG.news.find(x => x.id === aid);
            showView('detail');
            document.getElementById('btnBackToList').onclick = () => showNewsList(activeG.id);
            document.getElementById('artTitle').innerText = art.t;
            document.getElementById('artMeta').innerText = `Cập nhật: ${art.d} | Tác giả: Vũ Nhật Quang`;
            document.getElementById('artImg').src = art.thumb; // Gán ảnh bài viết
            document.getElementById('artBody').innerHTML = art.body;
            renderComments(art);
        }

        function doLogin() {
            if (user) {
                if(confirm("Bạn có muốn đăng xuất?")) {
                    user = null;
                    document.getElementById('user-display').innerHTML = `[ Đăng Nhập ]`;
            // Nếu đang ở trang chi tiết, render lại vùng bình luận để hiện thông báo yêu cầu đăng nhập
            const currentView = document.getElementById('view-detail');
            if (!currentView.classList.contains('hidden')) {
                const artId = parseInt(document.querySelector('button[onclick^="postCmt"]').onclick.toString().match(/\d+/)[0]);
                const art = activeG.news.find(x => x.id === artId);
                renderComments(art);
            }
        }
        return;
    }
    document.getElementById('loginModal').classList.remove('hidden');
    }

        function closeLogin() {
            document.getElementById('loginModal').classList.add('hidden');
        }

    // Xử lý đăng nhập giả lập
        function handleSocialLogin(platform) {
            user = "Quang Vũ (via " + platform + ")";
            document.getElementById('user-display').innerHTML = `● ${user}`;
            closeLogin();
            alert("Chào mừng " + user + " đã quay trở lại!");
    
    // Cập nhật lại giao diện bình luận nếu đang xem bài viết
        const detailView = document.getElementById('view-detail');
        if (!detailView.classList.contains('hidden')) {
        // Tìm bài viết hiện tại thông qua tiêu đề (hoặc biến toàn cục nếu có)
        const currentTitle = document.getElementById('artTitle').innerText;
        const art = activeG.news.find(n => n.t === currentTitle);
        if(art) renderComments(art);
    }
    }
        function switchTab(type) {
            const isLogin = type === 'login';
            document.getElementById('tabLogin').classList.toggle('active', isLogin);
            document.getElementById('tabRegister').classList.toggle('active', !isLogin);
            document.getElementById('formLogin').classList.toggle('hidden', !isLogin);
            document.getElementById('formRegister').classList.toggle('hidden', isLogin);
        }

        function handleFormAuth(type) {
            if (type === 'login') {
                const u = document.getElementById('loginUser').value;
                if (!u) return alert("Vui lòng nhập tài khoản!");
                user = u.split('@')[0]; // Lấy phần tên trước @ để hiển thị
    } else {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        if (!name || !email) return alert("Vui lòng điền đủ thông tin!");
        user = name;
        alert("Đăng ký thành công tài khoản: " + email);
    }
    
    document.getElementById('user-display').innerHTML = `● ${user}`;
    closeLogin();
    
    // Cập nhật vùng bình luận nếu đang ở chi tiết bài viết
    const detailView = document.getElementById('view-detail');
    if (!detailView.classList.contains('hidden')) {
        const currentTitle = document.getElementById('artTitle').innerText;
        const art = activeG.news.find(n => n.t === currentTitle);
        if(art) renderComments(art);
    }
}

        function renderComments(art) {
            const zone = document.getElementById('cmtZone');
            const list = document.getElementById('cmtList');
            zone.innerHTML = user 
                ? `<textarea id="ta" placeholder="Chia sẻ ý kiến của bạn..."></textarea>
                   <button onclick="postCmt(${art.id})" style="background:var(--primary); border:none; padding:10px 30px; border-radius:4px; font-weight:bold; cursor:pointer; font-family:'Orbitron'; font-size:0.7rem;">GỬI BÌNH LUẬN</button>`
                : `<p style="text-align:center; padding:20px; border:1px dashed var(--border); color:var(--text-dim)">Vui lòng <b onclick="doLogin()" style="color:var(--primary); cursor:pointer">Đăng nhập</b> để thảo luận.</p>`;
            
            list.innerHTML = art.cmts.map(c => `
                <div class="cmt-item">
                    <b style="color:var(--primary)">${c.u}</b>
                    <p style="margin-top:5px">${c.t}</p>
                </div>
            `).reverse().join('') || '<p style="margin-top:20px; color:var(--text-dim)">Chưa có thảo luận nào.</p>';
        }

        function postCmt(aid) {
            const val = document.getElementById('ta').value;
            if(!val.trim()) return;
            const art = activeG.news.find(x => x.id === aid);
            art.cmts.push({u: user, t: val});
            renderComments(art);
        }

        // Khởi tạo ban đầu
        renderGrid(database);
    </script>
</body>
</html>
